<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 120px; height: 120px; background: transparent; overflow: hidden; }

  #root {
    width: 120px; height: 120px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    cursor: pointer;
    -webkit-app-region: no-drag;
  }

  /* Drag handle — top area */
  #drag-handle {
    position: absolute; top: 0; left: 0; right: 0; height: 20px;
    -webkit-app-region: drag;
    cursor: move;
  }

  #sprite-wrap {
    position: relative;
    transition: transform 0.15s ease;
  }
  #sprite-wrap:hover { transform: scale(1.08); }
  #sprite-wrap:active { transform: scale(0.93); }

  #level-badge {
    position: absolute;
    top: -4px; right: -4px;
    width: 20px; height: 20px;
    border-radius: 50%;
    font-family: monospace;
    font-size: 10px;
    font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    color: #001a2e;
    z-index: 10;
    box-shadow: 0 0 6px var(--accent);
  }

  #bubble {
    position: absolute;
    bottom: 118px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,10,20,0.95);
    border: 1px solid var(--accent-dim);
    border-radius: 10px;
    padding: 8px 12px;
    font-family: monospace;
    font-size: 11px;
    color: #cde;
    white-space: nowrap;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    box-shadow: 0 0 16px var(--accent-glow);
    animation: bubbleIn 0.2s ease;
    pointer-events: none;
    z-index: 100;
  }
  #bubble::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%; transform: translateX(-50%);
    border-left: 8px solid transparent;
    border-right: 8px solid transparent;
    border-top: 8px solid var(--accent-dim);
  }

  @keyframes bubbleIn {
    from { opacity: 0; transform: translateX(-50%) translateY(6px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50%       { opacity: 1;   transform: scale(1.06); }
  }
  #aura {
    position: absolute; inset: -8px; border-radius: 50%;
    animation: pulse 3s ease-in-out infinite;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="root">
  <div id="drag-handle"></div>
  <div id="aura"></div>
  <div id="sprite-wrap">
    <div id="level-badge"></div>
    <svg id="sprite" width="80" height="80" viewBox="0 0 80 80"></svg>
  </div>
  <div id="bubble" style="display:none"></div>
</div>

<script>
// ── Color by mood ──
const MOOD_COLOR = {
  calm:    '#00e5ff', curious: '#aa88ff', excited: '#ffd700',
  focused: '#00ff88', sleepy:  '#446688', proud:   '#ff88cc',
};

let state = { level: 1, xp: 0, mood: 'calm', pats: 0, witnessed: [], last_comment: "Hey. I'm Velma." };
let bubbleTimer = null;

function setAccent(color) {
  document.documentElement.style.setProperty('--accent', color);
  document.documentElement.style.setProperty('--accent-dim', color + '66');
  document.documentElement.style.setProperty('--accent-glow', color + '33');
  document.getElementById('aura').style.background =
    `radial-gradient(circle, ${color}22 0%, transparent 70%)`;
  document.getElementById('level-badge').style.background = color;
  document.getElementById('level-badge').style.boxShadow = `0 0 8px ${color}`;
}

// ── Tier sprites (inline SVG) ──
function getTier(level) {
  if (level <= 3) return 1;
  if (level <= 6) return 2;
  if (level <= 10) return 3;
  return 4;
}

function renderSprite(level, mood, color) {
  const tier = getTier(level);
  const svg = document.getElementById('sprite');
  const sleeping = mood === 'sleepy';
  const excited = mood === 'excited';

  if (tier === 1) {
    svg.setAttribute('width', '64'); svg.setAttribute('height', '64');
    svg.setAttribute('viewBox', '0 0 64 64');
    svg.style.imageRendering = 'pixelated';
    const px = 4;
    const pixels = [
      [6,2],[7,2],[8,2],[9,2],
      [5,3],[6,3],[7,3],[8,3],[9,3],[10,3],
      [5,4],[6,4],[7,4],[8,4],[9,4],[10,4],
      [5,5],[6,5],[7,5],[8,5],[9,5],[10,5],
      [7,6],[8,6],
      [5,7],[6,7],[7,7],[8,7],[9,7],[10,7],
      [5,8],[6,8],[7,8],[8,8],[9,8],[10,8],
      [5,9],[6,9],[7,9],[8,9],[9,9],[10,9],
      [3,7],[4,7],[11,7],[12,7],[3,8],[11,8],
      [6,10],[7,10],[8,10],[9,10],
      [6,11],[7,11],[8,11],[9,11],
      [5,12],[6,12],[8,12],[9,12],
    ];
    const eyes = sleeping ? [[6,4,'#aaffee'],[9,4,'#aaffee']] :
                 excited  ? [[6,4,'#fff'],[9,4,'#fff']]        :
                            [[6,4,'#001a2e'],[9,4,'#001a2e']];
    svg.innerHTML = pixels.map(([x,y]) =>
      `<rect x="${x*px}" y="${y*px}" width="${px}" height="${px}" fill="${color}"/>`
    ).join('') + eyes.map(([x,y,c]) =>
      `<rect x="${x*px}" y="${y*px}" width="${px}" height="${px}" fill="${c}"/>`
    ).join('');

  } else if (tier === 2) {
    svg.setAttribute('width', '80'); svg.setAttribute('height', '80');
    svg.setAttribute('viewBox', '0 0 80 80');
    svg.style.imageRendering = 'auto';
    const eyeHtml = sleeping
      ? `<line x1="33" y1="25" x2="37" y2="25" stroke="${color}" stroke-width="2"/>
         <line x1="43" y1="25" x2="47" y2="25" stroke="${color}" stroke-width="2"/>`
      : `<ellipse cx="35" cy="25" rx="3" ry="3.5" fill="${color}"/>
         <ellipse cx="45" cy="25" rx="3" ry="3.5" fill="${color}"/>
         <ellipse cx="35" cy="25" rx="1.5" ry="1.5" fill="#001a2e"/>
         <ellipse cx="45" cy="25" rx="1.5" ry="1.5" fill="#001a2e"/>`;
    svg.innerHTML = `
      <defs>
        <radialGradient id="b2" cx="50%" cy="50%">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#001a2e" stop-opacity="1"/>
        </radialGradient>
        <filter id="g2"><feGaussianBlur stdDeviation="1.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <ellipse cx="40" cy="52" rx="14" ry="18" fill="url(#b2)" filter="url(#g2)"/>
      <ellipse cx="40" cy="26" rx="13" ry="13" fill="url(#b2)" filter="url(#g2)"/>
      ${eyeHtml}
      <path d="M26 48 Q18 44 14 52" stroke="${color}" stroke-width="2" fill="none" stroke-dasharray="3,2"/>
      <path d="M54 48 Q62 44 66 52" stroke="${color}" stroke-width="2" fill="none" stroke-dasharray="3,2"/>
      <ellipse cx="40" cy="10" rx="16" ry="4" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.7"/>`;

  } else if (tier === 3) {
    svg.setAttribute('width', '96'); svg.setAttribute('height', '96');
    svg.setAttribute('viewBox', '0 0 96 96');
    svg.style.imageRendering = 'auto';
    const sparkles = mood === 'proud'
      ? `<circle cx="20" cy="20" r="2" fill="#ffd700" opacity="0.9"/>
         <circle cx="76" cy="18" r="2" fill="#ffd700" opacity="0.9"/>
         <circle cx="14" cy="44" r="1.5" fill="${color}" opacity="0.8"/>
         <circle cx="82" cy="40" r="1.5" fill="${color}" opacity="0.8"/>` : '';
    svg.innerHTML = `
      <defs>
        <radialGradient id="a3" cx="50%" cy="40%">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.3"/>
          <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="b3" cx="50%" cy="40%">
          <stop offset="0%" stop-color="${color}" stop-opacity="0.95"/>
          <stop offset="60%" stop-color="${color}" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#001a2e" stop-opacity="0.9"/>
        </radialGradient>
        <filter id="g3"><feGaussianBlur stdDeviation="3" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <ellipse cx="48" cy="52" rx="36" ry="42" fill="url(#a3)"/>
      <path d="M28 82 Q24 60 28 50 Q32 38 48 36 Q64 38 68 50 Q72 60 68 82 Z" fill="url(#b3)" filter="url(#g3)"/>
      <ellipse cx="48" cy="28" rx="16" ry="16" fill="url(#b3)" filter="url(#g3)"/>
      <ellipse cx="41" cy="26" rx="4" ry="5" fill="${color}" filter="url(#g3)"/>
      <ellipse cx="55" cy="26" rx="4" ry="5" fill="${color}" filter="url(#g3)"/>
      <ellipse cx="41" cy="27" rx="2" ry="2.5" fill="#001a2e"/>
      <ellipse cx="55" cy="27" rx="2" ry="2.5" fill="#001a2e"/>
      <ellipse cx="48" cy="9" rx="20" ry="5" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.9" filter="url(#g3)"/>
      <path d="M30 58 Q14 52 10 62" stroke="${color}" stroke-width="2.5" fill="none" opacity="0.8"/>
      <path d="M66 58 Q82 52 86 62" stroke="${color}" stroke-width="2.5" fill="none" opacity="0.8"/>
      ${sparkles}`;

  } else {
    // Tier 4: holographic
    svg.setAttribute('width', '112'); svg.setAttribute('height', '112');
    svg.setAttribute('viewBox', '0 0 112 112');
    svg.style.imageRendering = 'auto';
    const particles = [[18,30],[16,50],[20,72],[96,34],[94,58],[98,78],[36,8],[76,8],[26,88],[86,90]];
    svg.innerHTML = `
      <defs>
        <radialGradient id="ch" cx="50%" cy="45%">
          <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
          <stop offset="30%" stop-color="${color}" stop-opacity="0.8"/>
          <stop offset="70%" stop-color="#aa44ff" stop-opacity="0.5"/>
          <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
        </radialGradient>
        <radialGradient id="bh" cx="50%" cy="40%">
          <stop offset="0%" stop-color="${color}" stop-opacity="1"/>
          <stop offset="50%" stop-color="#aa44ff" stop-opacity="0.7"/>
          <stop offset="100%" stop-color="#001a2e" stop-opacity="0.4"/>
        </radialGradient>
        <filter id="gh"><feGaussianBlur stdDeviation="4" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <filter id="gs"><feGaussianBlur stdDeviation="2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <ellipse cx="56" cy="60" rx="48" ry="52" fill="url(#ch)" opacity="0.4"/>
      <path d="M42 22 Q34 8 28 4 Q22 0 18 6" stroke="${color}" stroke-width="2" fill="none" opacity="0.7" filter="url(#gs)"/>
      <path d="M50 18 Q48 4 44 0" stroke="#aa44ff" stroke-width="1.5" fill="none" opacity="0.6"/>
      <path d="M62 18 Q64 4 68 0" stroke="${color}" stroke-width="1.5" fill="none" opacity="0.6"/>
      <path d="M70 22 Q78 8 84 4 Q90 0 94 6" stroke="#aa44ff" stroke-width="2" fill="none" opacity="0.7" filter="url(#gs)"/>
      <path d="M32 96 Q26 72 30 58 Q36 44 56 42 Q76 44 82 58 Q86 72 80 96 Z" fill="url(#bh)" filter="url(#gh)" opacity="0.85"/>
      <ellipse cx="56" cy="32" rx="20" ry="20" fill="url(#bh)" filter="url(#gh)"/>
      <path d="M40 70 L40 76 L46 76 M52 64 L58 64 L58 70 M68 72 L68 78 L62 78" stroke="${color}" stroke-width="1" fill="none" opacity="0.4"/>
      <ellipse cx="47" cy="30" rx="5" ry="6" fill="${color}" filter="url(#gh)"/>
      <ellipse cx="65" cy="30" rx="5" ry="6" fill="${color}" filter="url(#gh)"/>
      <ellipse cx="47" cy="31" rx="2.5" ry="3" fill="#001a2e"/>
      <ellipse cx="65" cy="31" rx="2.5" ry="3" fill="#001a2e"/>
      <ellipse cx="47" cy="31" rx="1" ry="1" fill="${color}" opacity="0.8"/>
      <ellipse cx="65" cy="31" rx="1" ry="1" fill="${color}" opacity="0.8"/>
      <ellipse cx="56" cy="10" rx="24" ry="6" fill="none" stroke="#ffd700" stroke-width="2.5" opacity="1" filter="url(#gh)"/>
      <ellipse cx="56" cy="10" rx="28" ry="8" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.4"/>
      ${particles.map(([x,y],i) =>
        `<circle cx="${x}" cy="${y}" r="2" fill="${i%2===0?color:'#ffd700'}" opacity="0.7" filter="url(#gs)"/>`
      ).join('')}
      <path d="M34 68 Q18 62 12 72" stroke="${color}" stroke-width="3" fill="none" opacity="0.8" filter="url(#gs)"/>
      <path d="M78 68 Q94 62 100 72" stroke="${color}" stroke-width="3" fill="none" opacity="0.8" filter="url(#gs)"/>
      <path d="M50 40 Q56 44 62 40" stroke="${color}" stroke-width="1.5" fill="none" opacity="0.6"/>`;
  }
}

function showBubble(text) {
  const el = document.getElementById('bubble');
  el.textContent = text;
  el.style.display = 'block';
  if (bubbleTimer) clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(() => { el.style.display = 'none'; }, 5000);
}

async function init() {
  state = await window.velma.getState();
  const color = MOOD_COLOR[state.mood] || '#00e5ff';
  setAccent(color);
  renderSprite(state.level, state.mood, color);
  document.getElementById('level-badge').textContent = state.level;

  // Greet on first open
  if (state.last_comment) showBubble(state.last_comment);
}

// Click = open panel
document.getElementById('sprite-wrap').addEventListener('click', (e) => {
  e.stopPropagation();
  window.velma.openPanel();
});

// Right-click = pet
document.getElementById('sprite-wrap').addEventListener('contextmenu', async (e) => {
  e.preventDefault();
  const result = await window.velma.pet();
  showBubble(result.comment);
  const color = MOOD_COLOR[state.mood] || '#00e5ff';
  setAccent(color);
  document.getElementById('level-badge').textContent = result.level;
  // Re-render if leveled up
  if (result.level !== state.level) {
    state.level = result.level;
    renderSprite(state.level, state.mood, color);
  }
});

// Occasional unprompted comment
setInterval(async () => {
  const s = await window.velma.getState();
  if (Math.random() < 0.12) {
    const comments = {
      calm:    ["Still here.", "Watching.", "All good."],
      curious: ["Interesting...", "What's next?"],
      excited: ["Let's go!!", "Big moves today."],
      focused: ["Focused. Don't mind me."],
      sleepy:  ["...zzzz...", "*yawns*"],
      proud:   ["Look at what you built.", "That was real."],
    };
    const list = comments[s.mood] || comments.calm;
    showBubble(list[Math.floor(Math.random() * list.length)]);
  }
}, 60000);

init();
</script>
</body>
</html>
