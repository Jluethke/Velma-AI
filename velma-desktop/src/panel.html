<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 320px; height: 480px;
    background: transparent;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    color: #cde;
  }

  #panel {
    width: 320px; height: 480px;
    background: rgba(0, 8, 18, 0.97);
    border: 1px solid #00e5ff44;
    border-radius: 16px;
    box-shadow: 0 0 40px #00e5ff22, 0 8px 32px rgba(0,0,0,0.8);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* Drag bar */
  #titlebar {
    -webkit-app-region: drag;
    height: 36px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid #00e5ff22;
    flex-shrink: 0;
    cursor: move;
  }
  #titlebar span { font-size: 12px; color: #00e5ff; letter-spacing: 2px; }
  #close-btn {
    -webkit-app-region: no-drag;
    background: none; border: none; color: #446; cursor: pointer;
    font-size: 18px; line-height: 1;
    transition: color 0.2s;
  }
  #close-btn:hover { color: #00e5ff; }

  /* Scroll area */
  #content {
    flex: 1; overflow-y: auto; padding: 16px;
    scrollbar-width: thin; scrollbar-color: #00e5ff22 transparent;
  }

  .section {
    margin-bottom: 20px;
  }

  .section-title {
    font-size: 9px; letter-spacing: 3px; text-transform: uppercase;
    color: #00e5ff88; margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after {
    content: ''; flex: 1; height: 1px; background: #00e5ff22;
  }

  /* Hero — name + mood */
  .hero {
    display: flex; align-items: center; gap: 12px; margin-bottom: 20px;
    padding: 12px;
    background: rgba(0,229,255,0.05);
    border: 1px solid #00e5ff22;
    border-radius: 10px;
  }
  .hero-name { font-size: 18px; color: #00e5ff; font-weight: bold; }
  .hero-title { font-size: 11px; color: #668; margin-top: 2px; }
  .mood-pill {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 10px; margin-top: 4px;
  }

  /* XP bar */
  .xp-wrap { margin-top: 8px; }
  .xp-label { display: flex; justify-content: space-between; font-size: 10px; color: #445; margin-bottom: 4px; }
  .xp-bar { height: 5px; background: #112233; border-radius: 3px; overflow: hidden; }
  .xp-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }

  /* Stats grid */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat-box {
    background: rgba(0,10,20,0.8);
    border: 1px solid #00e5ff11;
    border-radius: 8px;
    padding: 8px;
    text-align: center;
  }
  .stat-val { font-size: 18px; font-weight: bold; }
  .stat-lbl { font-size: 9px; color: #446; margin-top: 2px; letter-spacing: 1px; }

  /* Trust balance */
  .trust-box {
    background: linear-gradient(135deg, rgba(0,229,255,0.08), rgba(170,68,255,0.06));
    border: 1px solid #00e5ff33;
    border-radius: 10px;
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .trust-amount { font-size: 22px; font-weight: bold; color: #00e5ff; }
  .trust-symbol { font-size: 11px; color: #00e5ff88; margin-left: 4px; }
  .trust-addr { font-size: 9px; color: #445; margin-top: 4px; }

  /* Activity items */
  .activity-item {
    padding: 7px 10px;
    background: rgba(0,10,20,0.6);
    border-left: 2px solid #00e5ff33;
    border-radius: 4px;
    margin-bottom: 6px;
    font-size: 11px;
    color: #89a;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .activity-item.flow { border-color: #00ff8844; }
  .activity-item.memory { border-color: #aa44ff44; }

  /* Thought bubble */
  .thought {
    background: rgba(0,229,255,0.05);
    border: 1px dashed #00e5ff33;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 12px;
    color: #aac;
    font-style: italic;
    line-height: 1.5;
  }
  .thought::before { content: '"'; color: #00e5ff66; margin-right: 2px; }
  .thought::after  { content: '"'; color: #00e5ff66; margin-left: 2px; }

  /* Loading state */
  .loading { color: #334; font-size: 11px; text-align: center; padding: 20px; }

  /* Tier badge */
  .tier-badge {
    font-size: 9px; letter-spacing: 1px; padding: 2px 6px;
    border-radius: 4px; border: 1px solid;
    opacity: 0.8;
  }
</style>
</head>
<body>
<div id="panel">
  <div id="titlebar">
    <span>VELMA</span>
    <button id="close-btn" onclick="window.velma.closePanel()">×</button>
  </div>
  <div id="content">
    <div class="loading">Loading...</div>
  </div>
</div>

<script>
const MOOD_COLOR = {
  calm:    '#00e5ff', curious: '#aa88ff', excited: '#ffd700',
  focused: '#00ff88', sleepy:  '#446688', proud:   '#ff88cc',
};
const LEVEL_TITLES = [
  'Newborn','Curious Pup','Little Watcher','Companion',
  'Trusted Friend','Loyal Ally','Seasoned Companion','Wise Observer',
  'Veteran','Sage','Legend',
];
const TIER_NAMES = { 1:'8-bit', 2:'16-bit', 3:'32-bit', 4:'Holographic' };
const LEVEL_THRESHOLDS = [0,50,150,300,500,750,1050,1400,1800,2250,2750,3300,3900,4550,5250,6000];

function getTitle(level) { return LEVEL_TITLES[Math.min(level-1, LEVEL_TITLES.length-1)]; }
function getTier(level) { return level<=3?1:level<=6?2:level<=10?3:4; }
function getXpToNext(xp, level) {
  const next = LEVEL_THRESHOLDS[level] ?? xp;
  return Math.max(0, next - xp);
}

function truncateAddr(addr) {
  if (!addr) return 'not connected';
  return addr.slice(0,6) + '…' + addr.slice(-4);
}

async function load() {
  const data = await window.velma.getPanelData();
  const { state, walletAddress, trustBalance, recentActivity, randomThought, witnessedRecent } = data;
  const color = MOOD_COLOR[state.mood] || '#00e5ff';
  const tier = getTier(state.level);
  const title = getTitle(state.level);
  const xpToNext = getXpToNext(state.xp, state.level);
  const xpCurrent = LEVEL_THRESHOLDS[state.level - 1] ?? 0;
  const xpRange = (LEVEL_THRESHOLDS[state.level] ?? state.xp + 100) - xpCurrent;
  const xpProgress = Math.min(100, ((state.xp - xpCurrent) / xpRange) * 100);

  // Update panel border color
  document.getElementById('panel').style.borderColor = color + '44';
  document.getElementById('panel').style.boxShadow = `0 0 40px ${color}22, 0 8px 32px rgba(0,0,0,0.8)`;

  document.getElementById('content').innerHTML = `

    <!-- Hero -->
    <div class="hero">
      <div>
        <div class="hero-name">Velma</div>
        <div class="hero-title">
          Lv.${state.level} — ${title}
          <span class="tier-badge" style="color:${color};border-color:${color}44;margin-left:6px">
            ${TIER_NAMES[tier]}
          </span>
        </div>
        <span class="mood-pill" style="background:${color}18;border:1px solid ${color}44;color:${color}">
          ${state.mood}
        </span>
        <div class="xp-wrap">
          <div class="xp-label"><span>XP</span><span>${state.xp} / ${state.xp + xpToNext}</span></div>
          <div class="xp-bar">
            <div class="xp-fill" style="width:${xpProgress}%;background:linear-gradient(90deg,${color},#aa44ff)"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="section">
      <div class="section-title">stats</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-val" style="color:${color}">${state.pats ?? 0}</div>
          <div class="stat-lbl">PATS</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="color:${color}">${state.total_events ?? 0}</div>
          <div class="stat-lbl">WITNESSED</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" style="color:${color}">${state.level}</div>
          <div class="stat-lbl">LEVEL</div>
        </div>
      </div>
    </div>

    <!-- TRUST Balance -->
    <div class="section">
      <div class="section-title">trust balance</div>
      <div class="trust-box">
        <div>
          <div>
            <span class="trust-amount">${trustBalance !== null ? trustBalance.toLocaleString() : '—'}</span>
            <span class="trust-symbol">TRUST</span>
          </div>
          <div class="trust-addr">${truncateAddr(walletAddress)}</div>
        </div>
        <div style="font-size:24px;opacity:0.3">◈</div>
      </div>
    </div>

    <!-- Recent Activity -->
    ${witnessedRecent.length > 0 ? `
    <div class="section">
      <div class="section-title">recently witnessed</div>
      ${witnessedRecent.map(e => `
        <div class="activity-item ${e.includes('flow')||e.includes('chain')?'flow':e.includes('memory')||e.includes('fact')?'memory':''}">
          · ${e}
        </div>
      `).join('')}
    </div>` : ''}

    <!-- Memory fragments -->
    ${recentActivity.length > 0 ? `
    <div class="section">
      <div class="section-title">memory fragments</div>
      ${recentActivity.slice(0,3).map(item => `
        <div class="activity-item memory">· ${typeof item === 'string' ? item.slice(0,80) : JSON.stringify(item).slice(0,80)}</div>
      `).join('')}
    </div>` : ''}

    <!-- Velma's thought -->
    <div class="section">
      <div class="section-title">velma says</div>
      <div class="thought">${randomThought}</div>
    </div>

  `;
}

load();
</script>
</body>
</html>
