<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 320px; height: 540px;
    background: transparent;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #e8f4ff;
  }

  #panel {
    width: 320px; height: 540px;
    background: rgba(4, 12, 24, 0.98);
    border: 1px solid #00e5ff55;
    border-radius: 16px;
    box-shadow: 0 0 40px #00e5ff22, 0 8px 32px rgba(0,0,0,0.9);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  #titlebar {
    -webkit-app-region: drag;
    height: 40px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    border-bottom: 1px solid #00e5ff33;
    flex-shrink: 0;
  }
  #titlebar span { font-size: 13px; font-weight: 700; color: #00e5ff; letter-spacing: 3px; }
  #close-btn {
    -webkit-app-region: no-drag;
    background: none; border: none; color: #667; cursor: pointer;
    font-size: 20px; line-height: 1; transition: color 0.2s;
  }
  #close-btn:hover { color: #00e5ff; }

  #content {
    flex: 1; overflow-y: auto; padding: 14px 16px;
    scrollbar-width: thin; scrollbar-color: #00e5ff33 transparent;
  }

  .section { margin-bottom: 18px; }

  .section-title {
    font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    color: #00e5ffaa; margin-bottom: 10px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: #00e5ff33; }

  /* ── Hero row ── */
  .hero {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px;
    background: rgba(0,229,255,0.06);
    border: 1px solid #00e5ff33;
    border-radius: 12px;
    margin-bottom: 16px;
  }
  .hero-text { flex: 1; min-width: 0; }
  .hero-name { font-size: 20px; color: #00e5ff; font-weight: 800; }
  .hero-meta { font-size: 12px; color: #8aa; margin-top: 3px; }
  .mood-pill {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 600; margin-top: 6px; letter-spacing: 1px;
  }
  .xp-wrap { margin-top: 10px; }
  .xp-label { display: flex; justify-content: space-between; font-size: 11px; color: #7a9; margin-bottom: 4px; }
  .xp-bar { height: 6px; background: #0d2030; border-radius: 3px; overflow: hidden; }
  .xp-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }

  /* ── Care bars ── */
  .care-grid { display: flex; flex-direction: column; gap: 10px; }
  .care-row { display: flex; align-items: center; gap: 10px; }
  .care-icon { font-size: 15px; width: 22px; text-align: center; flex-shrink: 0; }
  .care-name { font-size: 11px; font-weight: 600; color: #9bb; width: 68px; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }
  .care-track { flex: 1; height: 8px; background: #0d2030; border-radius: 4px; overflow: hidden; }
  .care-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
  .care-val { font-size: 12px; font-weight: 700; width: 30px; text-align: right; flex-shrink: 0; }

  /* ── Thought bubble ── */
  .thought {
    background: rgba(0,229,255,0.06);
    border: 1px solid #00e5ff33;
    border-radius: 10px;
    padding: 13px 15px;
    font-size: 13px;
    color: #cce;
    font-style: italic;
    line-height: 1.6;
  }
  .thought::before { content: '"'; color: #00e5ffaa; font-size: 16px; }
  .thought::after  { content: '"'; color: #00e5ffaa; font-size: 16px; }

  /* ── Memory items ── */
  .mem-item {
    padding: 8px 12px;
    background: rgba(0,15,30,0.7);
    border-left: 3px solid #00e5ff44;
    border-radius: 6px;
    margin-bottom: 6px;
    font-size: 12px;
    color: #aac;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mem-item.loop     { border-color: #ff8844aa; color: #dba; }
  .mem-item.pattern  { border-color: #aa44ffaa; color: #bab; }
  .mem-item.witnessed { border-color: #00ff8866; color: #aca; }

  /* ── Suggestion card ── */
  .suggestion {
    padding: 12px 14px;
    background: rgba(0,229,255,0.07);
    border: 1px solid #00e5ff44;
    border-radius: 10px;
    font-size: 13px;
    color: #cde;
    line-height: 1.6;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .suggestion:hover { background: rgba(0,229,255,0.13); border-color: #00e5ff77; }
  .suggestion-label { font-size: 10px; font-weight: 700; color: #00e5ffaa; letter-spacing: 1px; margin-bottom: 5px; }

  /* ── TRUST row ── */
  .trust-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 15px;
    background: rgba(0,15,30,0.7);
    border: 1px solid #00e5ff33;
    border-radius: 10px;
  }
  .trust-amount { font-size: 22px; font-weight: 800; color: #00e5ff; }
  .trust-symbol { font-size: 12px; color: #00e5ffaa; margin-left: 4px; }
  .trust-addr { font-size: 11px; color: #668; margin-top: 3px; }
  .trust-icon { font-size: 22px; opacity: 0.3; }

  /* ── Quick actions ── */
  .actions { display: flex; gap: 8px; }
  .action-btn {
    flex: 1; padding: 10px 4px; border-radius: 10px;
    background: rgba(0,229,255,0.07); border: 1px solid #00e5ff33;
    color: #cde; font-family: 'Segoe UI', system-ui, sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer; text-align: center;
    transition: background 0.2s, border-color 0.2s;
  }
  .action-btn:hover { background: rgba(0,229,255,0.15); border-color: #00e5ff66; }
  .action-btn .btn-icon { font-size: 18px; display: block; margin-bottom: 3px; }

  /* ── Stats mini ── */
  .stats-row { display: flex; gap: 8px; }
  .stat-pill {
    flex: 1; text-align: center; padding: 8px 4px;
    background: rgba(0,15,30,0.8); border: 1px solid #00e5ff22;
    border-radius: 8px;
  }
  .stat-pill .val { font-size: 17px; font-weight: 800; }
  .stat-pill .lbl { font-size: 10px; font-weight: 600; color: #778; letter-spacing: 1px; margin-top: 2px; }

  .loading { color: #556; font-size: 13px; text-align: center; padding: 40px; }

  /* Tier badge */
  .tier { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; border: 1px solid; margin-left: 8px; }

  /* Neglected warning */
  .neglect-warn {
    padding: 10px 14px; background: rgba(255,80,80,0.08);
    border: 1px solid #ff444433; border-radius: 8px;
    font-size: 12px; color: #e99; text-align: center;
    margin-bottom: 14px;
  }
</style>
</head>
<body>
<div id="panel">
  <div id="titlebar">
    <span>VELMA</span>
    <button id="close-btn" onclick="window.velma.closePanel()">×</button>
  </div>
  <div id="content">
    <div class="loading">Loading...</div>
  </div>
</div>

<script>
const MOOD_COLOR = {
  happy:   '#00e5ff', curious: '#aa88ff', excited: '#ffd700',
  focused: '#00ff88', sleepy:  '#446688', proud:   '#ff88cc',
  hungry:  '#ff8844', bored:   '#445566', lonely:  '#8866aa',
};
const CARE_ICONS = { hunger: '🍖', happiness: '💙', energy: '⚡', curiosity: '🔭' };
const CARE_COLORS = {
  hunger:    (v) => v > 60 ? '#00e5ff' : v > 30 ? '#ffd700' : '#ff4444',
  happiness: (v) => v > 60 ? '#ff88cc' : v > 30 ? '#ffd700' : '#ff4444',
  energy:    (v) => v > 60 ? '#00ff88' : v > 30 ? '#ffd700' : '#ff4444',
  curiosity: (v) => v > 60 ? '#aa88ff' : v > 30 ? '#ffd700' : '#8866aa',
};
const LEVEL_TITLES = [
  'Egg','Hatchling','Pup','Companion',
  'Trusted Friend','Loyal Ally','Seasoned Companion','Wise Observer',
  'Veteran','Sage','Oracle','Legend',
];
const TIER_NAMES = { 1:'8-bit', 2:'16-bit', 3:'32-bit', 4:'Holographic' };
const LEVEL_THRESHOLDS = [0,50,150,300,500,750,1050,1400,1800,2250,2750,3300,3900,4550,5250,6000];

function getTier(l) { return l<=3?1:l<=6?2:l<=10?3:4; }
function getTitle(l) { return LEVEL_TITLES[Math.min(l-1, LEVEL_TITLES.length-1)]; }
function truncAddr(a) { return a ? a.slice(0,6)+'…'+a.slice(-4) : 'not connected'; }

function careBar(stat, value) {
  const color = CARE_COLORS[stat](value);
  return `
    <div class="care-row">
      <div class="care-icon">${CARE_ICONS[stat]}</div>
      <div class="care-name">${stat}</div>
      <div class="care-track"><div class="care-fill" style="width:${value}%;background:${color}"></div></div>
      <div class="care-val" style="color:${color}">${Math.round(value)}</div>
    </div>`;
}

async function load() {
  const data = await window.velma.getPanelData();
  const { state, walletAddress, trustBalance, recentActivity, randomThought, witnessedRecent, suggestion, openLoops, patterns, personality, schedule } = data;
  const color = MOOD_COLOR[state.mood] || '#00e5ff';
  const tier = getTier(state.level);
  const title = getTitle(state.level);
  const xpCurrent = LEVEL_THRESHOLDS[state.level - 1] ?? 0;
  const xpNext = LEVEL_THRESHOLDS[state.level] ?? state.xp + 100;
  const xpProgress = Math.min(100, ((state.xp - xpCurrent) / (xpNext - xpCurrent)) * 100);
  const care = state.care ?? { hunger: 80, happiness: 80, energy: 100, curiosity: 60 };

  document.getElementById('panel').style.borderColor = color + '44';
  document.getElementById('panel').style.boxShadow = `0 0 40px ${color}18, 0 8px 32px rgba(0,0,0,0.8)`;

  const neglected = state.times_neglected > 0 && care.hunger < 30;

  document.getElementById('content').innerHTML = `

    ${neglected ? `<div class="neglect-warn">⚠ Velma is hungry. She hasn't learned anything new in a while.</div>` : ''}

    <!-- Hero -->
    <div class="hero">
      <div class="hero-text">
        <div class="hero-name">Velma
          <span class="tier" style="color:${color};border-color:${color}44">${TIER_NAMES[tier]}</span>
        </div>
        <div class="hero-meta">Lv.${state.level} · ${title} · ${state.total_events ?? 0} events witnessed</div>
        <span class="mood-pill" style="background:${color}14;border:1px solid ${color}33;color:${color}">${state.mood}</span>
        <div class="xp-wrap">
          <div class="xp-label"><span>XP ${state.xp}</span><span>${xpNext - state.xp} to next level</span></div>
          <div class="xp-bar"><div class="xp-fill" style="width:${xpProgress}%;background:linear-gradient(90deg,${color},#aa44ff)"></div></div>
        </div>
      </div>
    </div>

    <!-- Care Stats -->
    <div class="section">
      <div class="section-title">care stats</div>
      <div class="care-grid">
        ${careBar('hunger', care.hunger)}
        ${careBar('happiness', care.happiness)}
        ${careBar('energy', care.energy)}
        ${careBar('curiosity', care.curiosity)}
      </div>
    </div>

    <!-- Velma's current thought -->
    <div class="section">
      <div class="section-title">velma says</div>
      <div class="thought">${state.last_thought || randomThought}</div>
    </div>

    <!-- Suggestion -->
    ${suggestion ? `
    <div class="section">
      <div class="section-title">she suggests</div>
      <div class="suggestion">
        <div class="suggestion-label">→ IDEA</div>
        ${suggestion}
      </div>
    </div>` : ''}

    <!-- Scheduled / due now -->
    ${schedule && schedule.length > 0 ? `
    <div class="section">
      <div class="section-title">due now</div>
      ${schedule.slice(0,3).map(s => `
        <div class="mem-item pattern" style="border-color:#ffd70044">
          ⏰ ${s.flow_name} <span style="color:#556;font-size:9px">(${s.confidence}% sure · ${s.times_seen_at_this_hour}x at ${s.suggested_hour}:00)</span>
        </div>`).join('')}
    </div>` : ''}

    <!-- Open loops -->
    ${openLoops && openLoops.length > 0 ? `
    <div class="section">
      <div class="section-title">open loops</div>
      ${openLoops.map(l => `<div class="mem-item loop">○ ${l}</div>`).join('')}
    </div>` : ''}

    <!-- Patterns she noticed -->
    ${patterns && patterns.length > 0 ? `
    <div class="section">
      <div class="section-title">patterns noticed</div>
      ${patterns.slice(-3).map(p => `<div class="mem-item pattern">~ ${p}</div>`).join('')}
    </div>` : ''}

    <!-- Recently witnessed -->
    ${witnessedRecent && witnessedRecent.length > 0 ? `
    <div class="section">
      <div class="section-title">recently witnessed</div>
      ${witnessedRecent.slice(0,4).map(e => `<div class="mem-item witnessed">· ${e}</div>`).join('')}
    </div>` : ''}

    <!-- Memory fragments -->
    ${recentActivity && recentActivity.length > 0 ? `
    <div class="section">
      <div class="section-title">memory fragments</div>
      ${recentActivity.slice(0,3).map(item => `
        <div class="mem-item">· ${(typeof item === 'string' ? item : JSON.stringify(item)).slice(0,80)}</div>
      `).join('')}
    </div>` : ''}

    <!-- Quick stats -->
    <div class="section">
      <div class="section-title">lifetime</div>
      <div class="stats-row">
        <div class="stat-pill"><div class="val" style="color:${color}">${state.pats ?? 0}</div><div class="lbl">PATS</div></div>
        <div class="stat-pill"><div class="val" style="color:${color}">${personality?.total_flows_seen ?? 0}</div><div class="lbl">FLOWS</div></div>
        <div class="stat-pill"><div class="val" style="color:${color}">${personality?.total_chains_seen ?? 0}</div><div class="lbl">CHAINS</div></div>
        <div class="stat-pill"><div class="val" style="color:${color}">${state.times_neglected ?? 0}</div><div class="lbl">NEGLECTS</div></div>
      </div>
    </div>

    <!-- TRUST balance -->
    <div class="section">
      <div class="section-title">trust balance</div>
      <div class="trust-row">
        <div>
          <div><span class="trust-amount">${trustBalance !== null ? trustBalance.toLocaleString() : '—'}</span><span class="trust-symbol">TRUST</span></div>
          <div class="trust-addr">${truncAddr(walletAddress)}</div>
        </div>
        <div class="trust-icon">◈</div>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="section">
      <div class="section-title">quick actions</div>
      <div class="actions">
        <button class="action-btn" onclick="doPat()"><span class="btn-icon">🤝</span>PAT</button>
        <button class="action-btn" onclick="doFeed()"><span class="btn-icon">🍖</span>FEED</button>
        <button class="action-btn" onclick="doRest()"><span class="btn-icon">💤</span>REST</button>
      </div>
    </div>

  `;
}

async function doPat() {
  const r = await window.velma.pet();
  // refresh panel after pat
  load();
}

function doFeed() {
  // Tell user to run a flow — open a tooltip or just show suggestion
  const el = document.querySelector('.thought');
  if (el) { el.textContent = 'Run a flow or chain to feed me! I need new knowledge.'; }
}

function doRest() {
  const el = document.querySelector('.thought');
  if (el) { el.textContent = 'Okay... resting. Energy restores while you work on other things.'; }
  window.velma.rest && window.velma.rest();
}

load();
</script>
</body>
</html>
